<div class="sales-shell">
  
    <form [formGroup]="categorySalesForm" class="controls">
  
      <mat-form-field appearance="fill" class="field">
        <mat-label>Category</mat-label>
        <mat-select formControlName="category_name">
          <mat-option value="">— choose —</mat-option>
          <mat-option *ngFor="let c of categories" [value]="c.categoryName">
            {{ c.categoryName }}
          </mat-option>
        </mat-select>
      </mat-form-field>
  
      <mat-form-field appearance="fill" class="field">
        <mat-label>Year</mat-label>
        <mat-select formControlName="category_year">
          <mat-option value="">— choose —</mat-option>
          <mat-option value="2022">2022</mat-option>
          <mat-option value="2023">2023</mat-option>
          <mat-option value="2024">2024</mat-option>
        </mat-select>
      </mat-form-field>
      
  
    </form>
  @if(data.length){
    <div class="chart-wrap">
        <canvas
          baseChart
          [data]="donutChartData"
          [options]="donutChartOptions"
          type="doughnut">
        </canvas>
      </div>
    
      <ng-template #empty>
        <div class="empty-state">
          <span>No data yet — pick a category & year above.</span>
        </div>
      </ng-template>

  }
  @else {
    <ng-template #empty>
        <div class="empty-state">
          <span>No data yet — pick a category & year above.</span>
        </div>
      </ng-template>
  }
</div>
